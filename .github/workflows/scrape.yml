name: Correr Scraper Diário

on:
  schedule:
    - cron: '0 3 * * *' # Corre todos os dias às 03:00 UTC
  workflow_dispatch: # Permite correr manualmente no botão "Run workflow"

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    services:
      flaresolverr:
        image: ghcr.io/flaresolverr/flaresolverr:latest
        ports:
          - 8191:8191
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install supabase requests beautifulsoup4 geopy groq curl_cffi python-dotenv

    - name: Wait for FlareSolverr
      run: |
        echo "⏳ A aguardar FlareSolverr..."
        for i in $(seq 1 30); do
          if curl -sf -X POST http://localhost:8191/v1 \
              -H 'Content-Type: application/json' \
              -d '{"cmd":"sessions.list"}' > /dev/null 2>&1; then
            echo "✅ FlareSolverr pronto"
            exit 0
          fi
          sleep 2
        done
        echo "⚠️ FlareSolverr timeout — prosseguindo sem"
      continue-on-error: true

    - name: Run Scraper Futebol
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python rota-da-festa/src/scraper_mestre.py

    - name: Run Scraper Festas/Cultura
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python rota-da-festa/src/scraper_festas.py

    - name: Run Scraper Câmaras Municipais
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      run: python rota-da-festa/src/scraper_camaras.py

    - name: Commit cache de estádios
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add rota-da-festa/src/cache_estadios.json || true
        git diff --cached --quiet || git commit -m "chore: update stadium cache [skip ci]"
        git push || true
